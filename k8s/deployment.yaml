apiVersion: apps/v1
kind: Deployment

metadata:
  name: production-blog-app
  namespace: production-blog

spec:
  replicas: 2

  selector:
    matchLabels:
      app: production-blog

  template:
    metadata:
      labels:
        app: production-blog

    spec:
      containers:
      - name: production-blog-container

        image: anmolak8/production-blog-app:latest

        imagePullPolicy: Always

        ports:
        - containerPort: 8080

        resources:
          requests:
            cpu: "250m"
            memory: "256Mi"

          limits:
            cpu: "500m"
            memory: "512Mi"
